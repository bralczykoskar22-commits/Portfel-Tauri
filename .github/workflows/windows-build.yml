name: Portfel Tauri — Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - tauri-migration
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v5

      - name: Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Pamięć podręczna Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Zależności
        shell: pwsh
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci --no-audit --fund=false --fetch-retries=5 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000

      - name: Test interfejsu
        run: npm test

      - name: Test i kompilacja Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Budowanie Portfela
        run: npm run build

      - name: Przygotuj pełną paczkę
        shell: pwsh
        run: |
          $package = "artifacts/Portfel-Tauri-Windows-x64-v0.6.0-alpha.1"
          New-Item "$package/Aplikacja" -ItemType Directory -Force | Out-Null
          New-Item "$package/Instalator" -ItemType Directory -Force | Out-Null
          New-Item "$package/Kod-zrodlowy/Portfel-Tauri" -ItemType Directory -Force | Out-Null

          Copy-Item "src-tauri/target/release/Portfel.exe" "$package/Aplikacja/Portfel.exe"
          Copy-Item "src-tauri/target/release/bundle/nsis/*.exe" "$package/Instalator/"
          Copy-Item "README.md", "TESTOWANIE.md", "CHANGELOG.md", "build-windows.bat" "$package/"

          $source = (Resolve-Path ".").Path
          $destination = (Resolve-Path "$package/Kod-zrodlowy/Portfel-Tauri").Path
          robocopy $source $destination /E /XD node_modules target artifacts .git gen /XF *.pdb
          if ($LASTEXITCODE -ge 8) { exit $LASTEXITCODE }
          exit 0

      - name: Opublikuj paczkę testową
        uses: actions/upload-artifact@v4
        with:
          name: Portfel-Tauri-Windows-x64-v0.6.0-alpha.1
          path: artifacts/Portfel-Tauri-Windows-x64-v0.6.0-alpha.1
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 30
